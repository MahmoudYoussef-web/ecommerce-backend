name: "🚀 Feature Request"
description: "Suggest a new feature or improvement"
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]

assignees:
  - MahmoudYoussef-web

body:
  - type: markdown
    attributes:
      value: |
        👋 Thanks for suggesting a feature!

        Please describe your idea clearly so we can evaluate and implement it effectively.

  # ================= PROBLEM =================
  - type: textarea
    id: problem
    attributes:
      label: 🧩 Problem Statement
      description: What problem does this feature solve?
      placeholder: "Currently there is no way to apply discount codes during checkout."
    validations:
      required: true

  # ================= SOLUTION =================
  - type: textarea
    id: solution
    attributes:
      label: 💡 Proposed Solution
      description: Describe your proposed solution in detail.
      placeholder: "Add support for promo codes in checkout with validation and discount calculation."
    validations:
      required: true

  # ================= USE CASE =================
  - type: textarea
    id: usecase
    attributes:
      label: 🎯 Use Case / User Story
      description: Who will use this feature and how?
      placeholder: |
        As a customer,
        I want to apply a discount code at checkout,
        So that I can get a reduced price.

  # ================= API / TECH =================
  - type: textarea
    id: api
    attributes:
      label: 📡 API / Technical Details (optional)
      description: Suggest API design, DB changes, or implementation ideas
      render: json
      placeholder: |
        POST /api/orders/apply-coupon
        {
          "code": "SUMMER25"
        }

  # ================= ALTERNATIVES =================
  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternatives Considered
      description: Any alternative solutions or workarounds?

  # ================= IMPACT =================
  - type: dropdown
    id: impact
    attributes:
      label: 📈 Impact
      options:
        - Low (minor improvement)
        - Medium (adds useful feature)
        - High (core feature enhancement)
        - Critical (required for production)
    validations:
      required: true

  # ================= AREA =================
  - type: dropdown
    id: area
    attributes:
      label: 🧱 Feature Area
      options:
        - Authentication & Security
        - Product & Catalog
        - Cart
        - Orders
        - Payments
        - Inventory
        - Reporting
        - Performance
        - DevOps / CI-CD
        - Other
    validations:
      required: true

  # ================= PRIORITY =================
  - type: dropdown
    id: priority
    attributes:
      label: ⏱️ Priority
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  # ================= ADDITIONAL =================
  - type: textarea
    id: additional
    attributes:
      label: 📎 Additional Context
      description: Any extra information (screenshots, links, etc.)