name: 🚀 Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
assignees:
  - MahmoudYoussef-web

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What's missing today?
      placeholder: "Currently there's no way to apply discount codes at checkout..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches or workarounds you've considered?

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      options:
        - Authentication & Security
        - Product & Catalog
        - Cart
        - Orders
        - Payments
        - Inventory
        - Reporting
        - Performance
        - Other
    validations:
      required: true