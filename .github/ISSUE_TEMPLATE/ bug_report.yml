name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees:
  - MahmoudYoussef-web

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I call POST /api/orders, I get a 500 error instead of creating the order..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Authenticate with POST /api/auth/login
        2. Add item to cart via POST /api/cart/items
        3. Call POST /api/orders with body { "addressId": 1 }
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include the full error response if applicable.
      render: json
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Commit
      description: What version or commit hash are you running?
      placeholder: "v1.0.0 or commit abc1234"
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local (bare metal)
        - Local (Docker)
        - Staging
        - Production
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant application logs here.
      render: shell